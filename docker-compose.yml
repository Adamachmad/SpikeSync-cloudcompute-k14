version: '3.8'

services:
  # MySQL Database Service
  mysql:
    image: mysql:8.0
    container_name: volleytrack_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: volleytrack_db
      MYSQL_USER: volleytrack_user
      MYSQL_PASSWORD: volleytrack_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - volleytrack_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s

  # PHP-FPM Service (Laravel)
  laravel:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: volleytrack_laravel
    working_dir: /var/www/html
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: volleytrack_db
      DB_USERNAME: volleytrack_user
      DB_PASSWORD: volleytrack_password
      APP_ENV: local
      APP_DEBUG: "true"
      LOG_CHANNEL: stack
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/php.ini
      - ./storage/logs:/var/www/html/storage/logs
    ports:
      - "9000:9000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - volleytrack_network

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: volleytrack_nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - laravel
    networks:
      - volleytrack_network

  # Redis Cache (Optional)
  redis:
    image: redis:7-alpine
    container_name: volleytrack_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - volleytrack_network
    command: redis-server --appendonly yes

networks:
  volleytrack_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
